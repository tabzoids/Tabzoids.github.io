<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Create account — Tabzoid</title>
  <link rel="icon" href="../favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="preload" href="../fonts/Opsilon-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face{ font-family:"Opsilon"; src:url("../fonts/Opsilon-Regular.woff2") format("woff2"); font-weight:400; font-display:swap; }
    :root{
      --bg:#0e0e12; --bg-elev:#16161c; --ink:#ececf2; --muted:#9a9aaa;
      --accent:#8a66ff; --accent-dark:#6b3fe4; --border:#25252e; --danger:#ff6b6b; --ok:#57d38c;
      --body:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{
      background:radial-gradient(1200px 600px at 50% -10%, rgba(138,102,255,.16), transparent 60%), var(--bg);
      color:var(--ink); font-family:var(--body); min-height:100vh;
      display:flex; align-items:center; justify-content:center; padding:22px; -webkit-font-smoothing:antialiased;
    }
    .card{ width:100%; max-width:380px; background:var(--bg-elev); border:1px solid var(--border); border-radius:16px; padding:26px 24px; }
    .brand{ display:block; text-align:center; font-family:"Opsilon",var(--body); font-size:1.4rem; color:#eae9f4; text-decoration:none; margin-bottom:4px; }
    h1{ font-family:"Opsilon",var(--body); font-weight:400; font-size:1.4rem; text-align:center; margin:8px 0 2px; }
    .sub{ text-align:center; color:var(--muted); font-size:.88rem; margin:0 0 20px; }
    label{ display:block; font-size:.78rem; color:var(--muted); margin:0 0 5px; }
    input{ width:100%; padding:11px 12px; margin-bottom:13px; border-radius:9px; border:1px solid var(--border); background:#0f0f15; color:var(--ink); font-size:.95rem; font-family:var(--body); }
    input:focus{ outline:none; border-color:var(--accent); }
    .hint{ font-size:.72rem; color:#6f6f80; margin:-8px 2px 13px; }
    button.primary{ width:100%; appearance:none; cursor:pointer; font-weight:600; font-family:var(--body); padding:12px 16px; border-radius:10px; font-size:.98rem; color:#fff; background:var(--accent-dark); border:1px solid var(--accent); transition:background .15s; }
    button.primary:hover{ background:var(--accent); }
    button.primary:disabled{ opacity:.55; cursor:not-allowed; }
    .note{ min-height:1.2em; margin:12px 2px 0; font-size:.84rem; color:var(--muted); text-align:center; }
    .note.ok{ color:var(--ok); } .note.err{ color:var(--danger); }
    .alt{ text-align:center; margin-top:16px; font-size:.82rem; color:var(--muted); }
    .alt a{ color:#bcb6e6; text-decoration:none; } .alt a:hover{ text-decoration:underline; }
  </style>
</head>
<body>
  <div class="card">
    <a class="brand" href="/">TABZOID</a>
    <h1>Create your account</h1>
    <p class="sub">Start your tab collection.</p>
    <form id="form" novalidate>
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@example.com" required />
      <label for="pass">Password</label>
      <input id="pass" type="password" autocomplete="new-password" placeholder="Password" required />
      <p class="hint">At least 6 characters.</p>
      <div class="cf-turnstile" data-sitekey="0x4AAAAAAD1LVVRMkJKcUBeh" data-theme="dark" style="margin:2px 0 14px;"></div>
      <button id="submit" class="primary" type="submit">Create account</button>
    </form>
    <p class="note" id="note" role="status" aria-live="polite"></p>
    <p class="alt">Already have an account? <a href="/login">Log in</a></p>
  </div>

  <script src="https://challenge.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = window.supabase.createClient("https://bgutoifpdohhlbhesjql.supabase.co", "sb_publishable_QfdIsgHMDn1kr4fszUeJ9g_HSKWLru-");
    const $ = (id) => document.getElementById(id);
    function setNote(t, k){ const n = $("note"); n.className = "note" + (k ? " " + k : ""); n.textContent = t; }

    $("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = $("email").value.trim();
      const password = $("pass").value;
      if (!email || !$("email").checkValidity()){ setNote("Enter a valid email.", "err"); return; }
      if (password.length < 6){ setNote("Password must be at least 6 characters.", "err"); return; }
      const captchaToken = window.turnstile ? turnstile.getResponse() : "";
      if (!captchaToken){ setNote("Please complete the verification below.", "err"); return; }
      $("submit").disabled = true; setNote("Creating your account…");
      const { data, error } = await sb.auth.signUp({
        email, password,
        options: { emailRedirectTo: window.location.origin + "/profile?welcome=1", captchaToken },
      });
      if (window.turnstile) turnstile.reset();
      if (error){ setNote(error.message || "Could not sign up.", "err"); $("submit").disabled = false; return; }
      $("pass").value = "";
      if (data.session){
        setNote("Account created — taking you in…", "ok");
        window.location.href = "/profile?welcome=1";
      } else {
        setNote("Almost there — check your email to confirm your account.", "ok");
        $("submit").disabled = false;
      }
    });
  </script>
</body>
</html>
