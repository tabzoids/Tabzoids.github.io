<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Waitlist — Tabzoid Admin</title>

  <link rel="icon" href="../favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="preload" href="../fonts/Opsilon-Regular.woff2" as="font" type="font/woff2" crossorigin>

  <style>
    @font-face{ font-family:"Opsilon"; src:url("../fonts/Opsilon-Regular.woff2") format("woff2"); font-weight:400; font-display:swap; }
    :root{
      --bg:#0e0e12; --bg-elev:#16161c; --ink:#ececf2; --muted:#9a9aaa;
      --accent:#8a66ff; --accent-dark:#6b3fe4; --border:#25252e; --danger:#ff6b6b; --ok:#57d38c;
      --body:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    *{box-sizing:border-box;}
    html,body{margin:0; padding:0;}
    body{
      background:radial-gradient(1200px 600px at 50% -10%, rgba(138,102,255,.14), transparent 60%), var(--bg);
      color:var(--ink); font-family:var(--body); min-height:100vh; -webkit-font-smoothing:antialiased;
    }
    body.loading .app{ display:none; }

    header.topnav{
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      padding:16px 22px; border-bottom:1px solid var(--border);
      position:sticky; top:0; background:rgba(14,14,18,.85); backdrop-filter:blur(6px); z-index:10;
    }
    .brand{ font-family:"Opsilon",var(--body); font-size:1.25rem; color:#eae9f4; text-decoration:none; }
    .nav{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .nav a, .nav button{
      font-family:var(--body); font-size:.85rem; font-weight:600; color:var(--muted);
      background:transparent; border:1px solid transparent; border-radius:9px; padding:8px 12px;
      cursor:pointer; text-decoration:none; transition:color .15s, background .15s, border-color .15s;
    }
    .nav a:hover, .nav button:hover{ color:#fff; background:var(--bg-elev); border-color:var(--border); }
    .nav a.active{ color:#fff; background:#1c1930; border-color:var(--accent); }
    .nav-ava{ width:30px; height:30px; padding:0; flex:0 0 auto; border-radius:50%; overflow:hidden; border:1px solid var(--border); background:#0f0f15; display:inline-flex; align-items:center; justify-content:center; font-size:.9rem; text-decoration:none; }
    .nav-ava img{ width:100%; height:100%; object-fit:cover; display:block; }
    .nav-ava:hover{ border-color:var(--accent); }

    main{ max-width:820px; margin:0 auto; padding:32px 22px 64px; }
    h1{ font-family:"Opsilon",var(--body); font-weight:400; font-size:1.9rem; margin:0 0 4px; }
    .sub{ color:var(--muted); margin:0 0 22px; font-size:.95rem; }

    .bar{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
    .stat{ font-size:.9rem; color:var(--muted); }
    .stat b{ color:#cdbcff; font-size:1.15rem; }
    .spacer{ flex:1 1 auto; }
    button.act{
      appearance:none; cursor:pointer; font-weight:600; font-family:var(--body); font-size:.82rem;
      padding:9px 14px; border-radius:9px; color:var(--ink);
      background:var(--bg-elev); border:1px solid var(--border); transition:border-color .15s, background .15s;
    }
    button.act:hover{ border-color:var(--accent); }
    button.act.primary{ background:var(--accent-dark); border-color:var(--accent); color:#fff; }
    button.act.primary:hover{ background:var(--accent); }

    .card{ background:var(--bg-elev); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    table{ width:100%; border-collapse:collapse; font-size:.9rem; }
    th, td{ text-align:left; padding:12px 16px; border-bottom:1px solid var(--border); }
    th{ font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
    tr:last-child td{ border-bottom:none; }
    td.email{ color:#dcd6ff; font-weight:600; }
    td.src{ color:var(--muted); }
    td.date{ color:var(--muted); white-space:nowrap; }
    td.del{ text-align:right; }
    .del button{
      background:transparent; border:none; color:var(--muted); cursor:pointer; font-size:1rem;
      padding:2px 6px; border-radius:6px;
    }
    .del button:hover{ color:var(--danger); background:#0f0f15; }
    .empty, .denied{ padding:26px 16px; color:var(--muted); text-align:center; font-size:.95rem; }
    .denied{ color:var(--danger); }
    .msg{ font-size:.85rem; margin-top:12px; min-height:1.1em; color:var(--muted); }
    .tabs{ display:flex; gap:6px; margin-bottom:18px; }
    .tab{
      appearance:none; cursor:pointer; font-weight:600; font-family:var(--body); font-size:.85rem;
      padding:9px 16px; border-radius:9px; color:var(--muted);
      background:var(--bg-elev); border:1px solid var(--border); transition:color .15s, background .15s, border-color .15s;
    }
    .tab:hover{ color:#fff; border-color:var(--accent); }
    .tab.active{ color:#fff; background:#1c1930; border-color:var(--accent); }
    td.msg-from{ color:#dcd6ff; font-weight:600; white-space:nowrap; vertical-align:top; }
    td.msg-from small{ display:block; color:var(--muted); font-weight:400; }
    td.msg-body{ color:var(--ink); max-width:360px; white-space:pre-wrap; word-break:break-word; }

    /* Vault gallery */
    .vsearch{ background:var(--bg-elev); border:1px solid var(--border); border-radius:9px; color:var(--ink); font:inherit; font-size:.85rem; padding:8px 12px; min-width:180px; }
    .vsearch:focus{ outline:none; border-color:var(--accent); }
    main.wide{ max-width:none; }
    .vgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:8px; }
    .vcard{ background:var(--bg-elev); border:1px solid var(--border); border-radius:9px; overflow:hidden; display:flex; flex-direction:column; }
    .vcard .thumb{ aspect-ratio:3/4; background:#0f0f15; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .vcard .thumb img{ width:100%; height:100%; object-fit:contain; }
    .vcard .meta{ padding:5px 7px; }
    .vcard .t{ font-weight:600; font-size:.72rem; color:#eae9f4; line-height:1.2; word-break:break-word; }
    .vcard .m{ font-size:.62rem; color:var(--muted); margin-top:1px; }
    .pill{ display:inline-block; margin-top:5px; font-size:.56rem; font-weight:700; letter-spacing:.03em; text-transform:uppercase; padding:2px 6px; border-radius:999px; cursor:pointer; border:1px solid var(--border); background:#0f0f15; color:var(--muted); transition:border-color .15s; }
    .pill:hover{ border-color:var(--accent); }
    .pill.published{ color:var(--ok); border-color:rgba(87,211,140,.4); background:rgba(87,211,140,.08); }

    /* Submissions */
    .sgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px; }
    .scard{ background:var(--bg-elev); border:1px solid var(--border); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; }
    .scard .imgs{ display:flex; gap:4px; background:#0f0f15; padding:6px; }
    .scard .imgs img{ width:50%; aspect-ratio:3/4; object-fit:contain; background:#0f0f15; border-radius:6px; }
    .scard .body{ padding:8px 10px; flex:1; }
    .scard .body .t{ font-weight:600; font-size:.85rem; color:#eae9f4; }
    .scard .body .m{ font-size:.72rem; color:var(--muted); margin-top:2px; }
    .scard .body .who{ font-size:.66rem; color:#6f6f80; margin-top:5px; }
    .scard .acts{ display:flex; gap:6px; padding:0 10px 10px; }
    .scard .acts button{ flex:1; cursor:pointer; font-weight:700; font-family:var(--body); font-size:.72rem; padding:7px; border-radius:8px; border:1px solid var(--border); background:#1c1930; color:var(--ink); }
    .scard .acts .ok{ color:var(--ok); border-color:rgba(87,211,140,.4); }
    .scard .acts .no{ color:var(--danger); border-color:rgba(255,107,107,.4); }
    .scard .acts button:disabled{ opacity:.5; cursor:not-allowed; }
    /* Users table cells */
    td.admin-cell button, td.uacts button{ cursor:pointer; font-size:.72rem; padding:5px 9px; border-radius:7px; border:1px solid var(--border); background:#0f0f15; color:var(--muted); }
    td.admin-cell button:hover, td.uacts button:hover{ border-color:var(--accent); color:#fff; }
    td.admin-cell button.on{ color:var(--ok); border-color:rgba(87,211,140,.4); }
    td.uacts{ text-align:right; white-space:nowrap; } td.uacts button{ margin-left:5px; }
    td.uacts button.danger:hover{ border-color:var(--danger); color:var(--danger); }
  </style>
</head>
<body class="loading">
  <div class="app">
    <header class="topnav">
      <a class="brand" href="/">Tabzoid</a>
      <nav class="nav">
        <a href="/tabs">Tabs</a>
        <a href="/profile">Profile</a>
        <a href="/admin" class="active">Admin</a>
        <button id="logoutBtn" type="button">Log out</button>
        <a href="/profile" class="nav-ava" id="navAva" title="Your profile"></a>
      </nav>
    </header>

    <main>
      <h1>Admin</h1>
      <p class="sub">Private dashboard — admins only.</p>

      <div id="denied" class="denied" style="display:none">
        You're signed in, but this account isn't an admin. Nothing to see here.
      </div>

      <div id="panel" style="display:none">
        <div class="tabs">
          <button id="tabWaitlist" class="tab active" type="button">Waitlist</button>
          <button id="tabMessages" class="tab" type="button">Messages</button>
          <button id="tabVault" class="tab" type="button">Vault</button>
          <button id="tabSubmissions" class="tab" type="button">Submissions</button>
          <button id="tabUsers" class="tab" type="button">Users</button>
        </div>

        <div id="waitlistView">
          <div class="bar">
            <span class="stat"><b id="count">0</b> subscribers</span>
            <span class="spacer"></span>
            <button id="refreshBtn" class="act" type="button">Refresh</button>
            <button id="csvBtn" class="act primary" type="button">Export CSV</button>
          </div>
          <div class="card">
            <table>
              <thead>
                <tr><th>Email</th><th>Source</th><th>Signed up</th><th></th></tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
        </div>

        <div id="messagesView" style="display:none">
          <div class="bar">
            <span class="stat"><b id="mcount">0</b> messages</span>
            <span class="spacer"></span>
            <button id="mrefreshBtn" class="act" type="button">Refresh</button>
          </div>
          <div class="card">
            <table>
              <thead>
                <tr><th>From</th><th>Message</th><th>Received</th><th></th></tr>
              </thead>
              <tbody id="mrows"></tbody>
            </table>
          </div>
        </div>

        <div id="vaultView" style="display:none">
          <div class="bar">
            <span class="stat"><b id="vcount">0</b> tabs</span>
            <input id="vsearch" class="vsearch" type="text" placeholder="Search word / color / brand…" />
            <span class="spacer"></span>
            <button id="vrefreshBtn" class="act" type="button">Refresh</button>
          </div>
          <div id="vgrid" class="vgrid"></div>
        </div>

        <div id="submissionsView" style="display:none">
          <div class="bar">
            <span class="stat"><b id="scount">0</b> pending</span>
            <span class="spacer"></span>
            <button id="srefreshBtn" class="act" type="button">Refresh</button>
          </div>
          <div id="sgrid" class="sgrid"></div>
        </div>

        <div id="usersView" style="display:none">
          <div class="bar">
            <span class="stat"><b id="ucount">0</b> users</span>
            <input id="usearch" class="vsearch" type="text" placeholder="Search email / name…" />
            <span class="spacer"></span>
            <button id="urefreshBtn" class="act" type="button">Refresh</button>
          </div>
          <div class="card">
            <table>
              <thead><tr><th>User</th><th>Joined</th><th>Status</th><th>Admin</th><th></th></tr></thead>
              <tbody id="urows"></tbody>
            </table>
          </div>
        </div>

        <div id="msg" class="msg"></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://bgutoifpdohhlbhesjql.supabase.co";
    const SUPABASE_KEY = "sb_publishable_QfdIsgHMDn1kr4fszUeJ9g_HSKWLru-";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const $ = (id) => document.getElementById(id);

    let data = [];
    let msgData = [];
    let messagesLoaded = false;

    function setNavAva(url){
      const el = document.getElementById("navAva");
      if (!el) return;
      if (url){ el.innerHTML = ""; const i = document.createElement("img"); i.src = url; i.alt = ""; el.appendChild(i); }
      else { el.innerHTML = "<span>🥫</span>"; }
    }

    async function guard(){
      const { data:{ session } } = await sb.auth.getSession();
      if (!session){ window.location.replace("/"); return null; }
      document.body.classList.remove("loading");
      return session;
    }

    function fmtDate(iso){
      return new Date(iso).toLocaleString(undefined, { year:"numeric", month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" });
    }

    async function load(){
      const { data: rows, error } = await sb.from("waitlist")
        .select("id, email, source, created_at")
        .order("created_at", { ascending:false });
      if (error){ $("msg").textContent = error.message; return; }
      data = rows || [];
      $("count").textContent = data.length;
      const body = $("rows");
      body.innerHTML = "";
      if (!data.length){
        body.innerHTML = '<tr><td colspan="4" class="empty">No subscribers yet.</td></tr>';
        return;
      }
      for (const r of data){
        const tr = document.createElement("tr");
        tr.innerHTML = '<td class="email"></td><td class="src"></td><td class="date"></td><td class="del"><button title="Delete">&times;</button></td>';
        tr.querySelector(".email").textContent = r.email;
        tr.querySelector(".src").textContent = r.source || "—";
        tr.querySelector(".date").textContent = fmtDate(r.created_at);
        tr.querySelector(".del button").addEventListener("click", () => removeRow(r));
        body.appendChild(tr);
      }
    }

    async function removeRow(r){
      if (!confirm("Remove " + r.email + " from the waitlist?")) return;
      const { error } = await sb.from("waitlist").delete().eq("id", r.id);
      if (error){ $("msg").textContent = error.message; return; }
      load();
    }

    function exportCSV(){
      const header = "email,source,created_at\n";
      const body = data.map(r =>
        [r.email, r.source || "", r.created_at].map(v => '"' + String(v).replace(/"/g,'""') + '"').join(",")
      ).join("\n");
      const blob = new Blob([header + body], { type:"text/csv" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "tabzoid-waitlist-" + new Date().toISOString().slice(0,10) + ".csv";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    async function loadMessages(){
      const { data: rows, error } = await sb.from("contact_messages")
        .select("id, name, email, message, created_at")
        .order("created_at", { ascending:false });
      if (error){ $("msg").textContent = error.message; return; }
      msgData = rows || [];
      $("mcount").textContent = msgData.length;
      const body = $("mrows");
      body.innerHTML = "";
      if (!msgData.length){
        body.innerHTML = '<tr><td colspan="4" class="empty">No messages yet.</td></tr>';
        return;
      }
      for (const r of msgData){
        const tr = document.createElement("tr");
        tr.innerHTML = '<td class="msg-from"></td><td class="msg-body"></td><td class="date"></td><td class="del"><button title="Delete">&times;</button></td>';
        const from = tr.querySelector(".msg-from");
        from.textContent = r.name || "(no name)";
        const em = document.createElement("small"); em.textContent = r.email; from.appendChild(em);
        tr.querySelector(".msg-body").textContent = r.message;
        tr.querySelector(".date").textContent = fmtDate(r.created_at);
        tr.querySelector(".del button").addEventListener("click", () => removeMessage(r));
        body.appendChild(tr);
      }
    }

    async function removeMessage(r){
      if (!confirm("Delete this message from " + r.email + "?")) return;
      const { error } = await sb.from("contact_messages").delete().eq("id", r.id);
      if (error){ $("msg").textContent = error.message; return; }
      loadMessages();
    }

    // ---- Vault (zoid_vault) ----
    let vaultData = [];
    let vaultLoaded = false;

    async function loadVault(){
      const { data: rows, error } = await sb.from("zoid_vault")
        .select("id,title,slug,color_type,color_variant,mark_media,image_front_thumb,publishing_status,brand")
        .order("color_type", { ascending:true })
        .order("slug", { ascending:true });
      if (error){ $("msg").textContent = error.message; return; }
      vaultData = rows || [];
      renderVault();
    }

    function renderVault(){
      const q = ($("vsearch").value || "").trim().toLowerCase();
      const list = q
        ? vaultData.filter(r => [r.title, r.mark_media, r.color_type, r.color_variant, r.brand]
            .some(v => (v || "").toLowerCase().includes(q)))
        : vaultData;
      $("vcount").textContent = list.length;
      const grid = $("vgrid"); grid.innerHTML = "";
      if (!list.length){ grid.innerHTML = '<div class="empty">No tabs.</div>'; return; }
      for (const r of list){
        const card = document.createElement("div"); card.className = "vcard";
        const thumb = document.createElement("div"); thumb.className = "thumb";
        if (r.image_front_thumb){
          const img = document.createElement("img");
          img.loading = "lazy"; img.src = r.image_front_thumb; img.alt = r.title || "";
          thumb.appendChild(img);
        }
        const meta = document.createElement("div"); meta.className = "meta";
        meta.innerHTML = '<div class="t"></div><div class="m"></div>';
        meta.querySelector(".t").textContent = r.mark_media || r.title || r.slug;
        meta.querySelector(".m").textContent = r.color_type + (r.color_variant ? " · " + r.color_variant : "");
        const pub = r.publishing_status === "Published";
        const pill = document.createElement("span");
        pill.className = "pill " + (pub ? "published" : "other");
        pill.textContent = r.publishing_status || "—";
        pill.title = "Click to " + (pub ? "unpublish" : "publish");
        pill.addEventListener("click", () => togglePublish(r));
        meta.appendChild(pill);
        card.appendChild(thumb); card.appendChild(meta);
        grid.appendChild(card);
      }
    }

    async function togglePublish(r){
      const next = r.publishing_status === "Published" ? "Candidate" : "Published";
      const { error } = await sb.from("zoid_vault").update({ publishing_status: next }).eq("id", r.id);
      if (error){ $("msg").textContent = error.message; return; }
      r.publishing_status = next; renderVault();
    }

    // ---- Submissions (moderation queue over tab_finds) ----
    let adminId = null;

    async function tabSigned(path){
      if (!path) return null;
      const { data } = await sb.storage.from("tab-uploads").createSignedUrl(path, 3600);
      return data ? data.signedUrl : null;
    }
    async function thumbFromBlob(blob, maxEdge){
      const img = await new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = URL.createObjectURL(blob); });
      let w = img.width, h = img.height; const s = Math.min(1, maxEdge / Math.max(w, h));
      w = Math.round(w * s); h = Math.round(h * s);
      const c = document.createElement("canvas"); c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h); URL.revokeObjectURL(img.src);
      return await new Promise((r) => c.toBlob(r, "image/webp", 0.8));
    }

    async function loadSubmissions(){
      const { data, error } = await sb.from("tab_finds")
        .select("id,user_id,brand,flavor,color,mark,note,image_front,image_back,submitted_at")
        .eq("review_status", "submitted").order("submitted_at", { ascending:true });
      if (error){ $("msg").textContent = error.message; return; }
      const subs = data || [];
      $("scount").textContent = subs.length;
      const ids = [...new Set(subs.map((s) => s.user_id))];
      let pmap = {};
      if (ids.length){
        const { data: profs } = await sb.from("profiles").select("id,username,display_name").in("id", ids);
        pmap = Object.fromEntries((profs ?? []).map((p) => [p.id, p]));
      }
      const grid = $("sgrid"); grid.innerHTML = "";
      if (!subs.length){ grid.innerHTML = '<div class="empty">No pending submissions.</div>'; return; }
      for (const s of subs){
        const card = document.createElement("div"); card.className = "scard";
        const imgs = document.createElement("div"); imgs.className = "imgs";
        for (const p of [s.image_front, s.image_back]){
          const img = document.createElement("img"); img.alt = "";
          if (p) tabSigned(p).then((u) => { if (u) img.src = u; });
          imgs.appendChild(img);
        }
        const body = document.createElement("div"); body.className = "body";
        const who = pmap[s.user_id];
        body.innerHTML = '<div class="t"></div><div class="m"></div><div class="who"></div>';
        body.querySelector(".t").textContent = s.brand;
        body.querySelector(".m").textContent = [s.flavor, s.color, s.mark].filter(Boolean).join(" · ");
        body.querySelector(".who").textContent = "by " + (who ? (who.display_name || who.username || s.user_id.slice(0,8)) : s.user_id.slice(0,8));
        const acts = document.createElement("div"); acts.className = "acts";
        const ap = document.createElement("button"); ap.className = "ok"; ap.textContent = "Approve";
        ap.addEventListener("click", () => approveSub(s, ap));
        const rj = document.createElement("button"); rj.className = "no"; rj.textContent = "Reject";
        rj.addEventListener("click", () => rejectSub(s));
        acts.appendChild(ap); acts.appendChild(rj);
        card.appendChild(imgs); card.appendChild(body); card.appendChild(acts);
        grid.appendChild(card);
      }
    }

    async function approveSub(s, btn){
      if (btn) btn.disabled = true;
      $("msg").textContent = "Approving…";
      try {
        const urls = {};
        for (const [side, path] of [["front", s.image_front], ["back", s.image_back]]){
          if (!path) continue;
          const { data: blob, error: dErr } = await sb.storage.from("tab-uploads").download(path);
          if (dErr) throw dErr;
          const fullKey = "ugc/" + s.id + "/" + side + ".webp";
          const { error: e1 } = await sb.storage.from("catalog-ugc").upload(fullKey, blob, { upsert:true, contentType:"image/webp" });
          if (e1) throw e1;
          urls["image_" + side] = sb.storage.from("catalog-ugc").getPublicUrl(fullKey).data.publicUrl;
          const tb = await thumbFromBlob(blob, 300);
          const thumbKey = "ugc/" + s.id + "/" + side + "_thumb.webp";
          const { error: e2 } = await sb.storage.from("catalog-ugc").upload(thumbKey, tb, { upsert:true, contentType:"image/webp" });
          if (e2) throw e2;
          urls["image_" + side + "_thumb"] = sb.storage.from("catalog-ugc").getPublicUrl(thumbKey).data.publicUrl;
        }
        const { data: vrow, error: vErr } = await sb.from("zoid_vault").insert({
          title: s.brand + (s.mark ? (" — " + s.mark) : ""),
          slug: "ugc-" + s.id.slice(0, 8),
          brand: s.brand, flavor: s.flavor, color_type: s.color, mark_media: s.mark,
          image_front: urls.image_front || null, image_front_thumb: urls.image_front_thumb || null,
          image_back: urls.image_back || null, image_back_thumb: urls.image_back_thumb || null,
          publishing_status: "Candidate",
        }).select("id").single();
        if (vErr) throw vErr;
        const { error: uErr } = await sb.from("tab_finds").update({
          review_status: "approved", reviewed_by: adminId, reviewed_at: new Date().toISOString(), vault_id: vrow.id,
        }).eq("id", s.id);
        if (uErr) throw uErr;
        $("msg").textContent = "Approved — added to the catalog as a Candidate. Publish it from the Vault tab.";
        vaultLoaded = false; loadSubmissions();
      } catch (e){
        $("msg").textContent = "Approve failed: " + (e.message || e);
        if (btn) btn.disabled = false;
      }
    }

    async function rejectSub(s){
      const reason = prompt("Reason for rejection (shown to the user):");
      if (reason === null) return;
      const { error } = await sb.from("tab_finds").update({
        review_status: "rejected", review_note: reason || null, reviewed_by: adminId, reviewed_at: new Date().toISOString(),
      }).eq("id", s.id);
      if (error){ $("msg").textContent = error.message; return; }
      loadSubmissions();
    }

    // ---- Users (via admin-users Edge Function) ----
    let usersData = [];
    let usersLoaded = false;

    async function callAdmin(action, payload){
      const { data, error } = await sb.functions.invoke("admin-users", { body: { action, ...payload } });
      if (error) throw error;
      if (data && data.error) throw new Error(data.error);
      return data;
    }
    async function loadUsers(){
      $("msg").textContent = "Loading users…";
      try { const d = await callAdmin("list", {}); usersData = d.users || []; $("msg").textContent = ""; renderUsers(); }
      catch (e){ $("msg").textContent = "Could not load users: " + e.message; }
    }
    function renderUsers(){
      const q = ($("usearch").value || "").trim().toLowerCase();
      const list = q ? usersData.filter((u) => [u.email, u.username, u.display_name].some((v) => (v || "").toLowerCase().includes(q))) : usersData;
      $("ucount").textContent = list.length;
      const body = $("urows"); body.innerHTML = "";
      if (!list.length){ body.innerHTML = '<tr><td colspan="5" class="empty">No users.</td></tr>'; return; }
      for (const u of list){
        const banned = u.banned_until && new Date(u.banned_until) > new Date();
        const tr = document.createElement("tr");
        tr.innerHTML = '<td class="email"></td><td class="date"></td><td class="src"></td><td class="admin-cell"></td><td class="uacts"></td>';
        tr.querySelector(".email").textContent = u.email + (u.display_name ? (" · " + u.display_name) : "");
        tr.querySelector(".date").textContent = fmtDate(u.created_at);
        tr.querySelector(".src").textContent = banned ? "Banned" : "Active";
        const ab = document.createElement("button"); ab.textContent = u.is_admin ? "Admin ✓" : "Make admin";
        if (u.is_admin) ab.classList.add("on");
        ab.addEventListener("click", () => toggleAdmin(u)); tr.querySelector(".admin-cell").appendChild(ab);
        const ua = tr.querySelector(".uacts");
        const bb = document.createElement("button"); bb.textContent = banned ? "Unban" : "Ban";
        bb.addEventListener("click", () => banUser(u, !banned)); ua.appendChild(bb);
        const db = document.createElement("button"); db.className = "danger"; db.textContent = "Delete";
        db.addEventListener("click", () => deleteUser(u)); ua.appendChild(db);
        body.appendChild(tr);
      }
    }
    async function toggleAdmin(u){
      if (!confirm((u.is_admin ? "Remove admin from " : "Grant admin to ") + u.email + "?")) return;
      try { await callAdmin("setAdmin", { userId: u.id, value: !u.is_admin }); u.is_admin = !u.is_admin; renderUsers(); }
      catch (e){ $("msg").textContent = e.message; }
    }
    async function banUser(u, ban){
      try { await callAdmin("ban", { userId: u.id, value: ban ? undefined : false });
        u.banned_until = ban ? new Date(Date.now() + 3.1e12).toISOString() : null; renderUsers(); }
      catch (e){ $("msg").textContent = e.message; }
    }
    async function deleteUser(u){
      if (!confirm("Permanently delete " + u.email + " and all their data?")) return;
      try { await callAdmin("delete", { userId: u.id }); usersData = usersData.filter((x) => x.id !== u.id); renderUsers(); }
      catch (e){ $("msg").textContent = e.message; }
    }

    function showTab(which){
      const views = { waitlist:"waitlistView", messages:"messagesView", vault:"vaultView", submissions:"submissionsView", users:"usersView" };
      for (const [k, v] of Object.entries(views)) $(v).style.display = (k === which) ? "" : "none";
      document.querySelector("main").classList.toggle("wide", which === "vault" || which === "submissions" || which === "users");
      for (const t of ["Waitlist","Messages","Vault","Submissions","Users"]) $("tab" + t).classList.toggle("active", which === t.toLowerCase());
      $("msg").textContent = "";
      if (which === "messages" && !messagesLoaded){ messagesLoaded = true; loadMessages(); }
      if (which === "vault" && !vaultLoaded){ vaultLoaded = true; loadVault(); }
      if (which === "submissions"){ loadSubmissions(); }
      if (which === "users" && !usersLoaded){ usersLoaded = true; loadUsers(); }
    }

    $("logoutBtn").addEventListener("click", async () => { await sb.auth.signOut(); window.location.replace("/"); });
    $("refreshBtn").addEventListener("click", load);
    $("csvBtn").addEventListener("click", exportCSV);
    $("mrefreshBtn").addEventListener("click", loadMessages);
    $("tabWaitlist").addEventListener("click", () => showTab("waitlist"));
    $("tabMessages").addEventListener("click", () => showTab("messages"));
    $("tabVault").addEventListener("click", () => showTab("vault"));
    $("vrefreshBtn").addEventListener("click", loadVault);
    $("vsearch").addEventListener("input", renderVault);
    $("tabSubmissions").addEventListener("click", () => showTab("submissions"));
    $("tabUsers").addEventListener("click", () => showTab("users"));
    $("srefreshBtn").addEventListener("click", loadSubmissions);
    $("urefreshBtn").addEventListener("click", loadUsers);
    $("usearch").addEventListener("input", renderUsers);
    sb.auth.onAuthStateChange((event) => { if (event === "SIGNED_OUT") window.location.replace("/"); });

    (async () => {
      const session = await guard();
      if (!session) return;
      // admin gate
      const { data: prof } = await sb.from("profiles").select("is_admin, avatar_url").eq("id", session.user.id).maybeSingle();
      if (prof) setNavAva(prof.avatar_url);
      if (!prof || !prof.is_admin){ $("denied").style.display = "block"; return; }
      adminId = session.user.id;
      $("panel").style.display = "block";
      load();
    })();
  </script>
</body>
</html>
