<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Log in — Tabzoid</title>
  <link rel="icon" href="../favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="preload" href="../fonts/Opsilon-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    @font-face{ font-family:"Opsilon"; src:url("../fonts/Opsilon-Regular.woff2") format("woff2"); font-weight:400; font-display:swap; }
    :root{
      --bg:#0e0e12; --bg-elev:#16161c; --ink:#ececf2; --muted:#9a9aaa;
      --accent:#8a66ff; --accent-dark:#6b3fe4; --border:#25252e; --danger:#ff6b6b; --ok:#57d38c;
      --body:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    *{box-sizing:border-box;} html,body{margin:0;padding:0;}
    body{
      background:radial-gradient(1200px 600px at 50% -10%, rgba(138,102,255,.16), transparent 60%), var(--bg);
      color:var(--ink); font-family:var(--body); min-height:100vh;
      display:flex; align-items:center; justify-content:center; padding:22px; -webkit-font-smoothing:antialiased;
    }
    .card{ width:100%; max-width:380px; background:var(--bg-elev); border:1px solid var(--border); border-radius:16px; padding:26px 24px; }
    .brand{ display:block; text-align:center; font-family:"Opsilon",var(--body); font-size:1.4rem; color:#eae9f4; text-decoration:none; margin-bottom:4px; }
    h1{ font-family:"Opsilon",var(--body); font-weight:400; font-size:1.4rem; text-align:center; margin:8px 0 2px; }
    .sub{ text-align:center; color:var(--muted); font-size:.88rem; margin:0 0 20px; }
    label{ display:block; font-size:.78rem; color:var(--muted); margin:0 0 5px; }
    input{ width:100%; padding:11px 12px; margin-bottom:13px; border-radius:9px; border:1px solid var(--border); background:#0f0f15; color:var(--ink); font-size:.95rem; font-family:var(--body); }
    input:focus{ outline:none; border-color:var(--accent); }
    button.primary{ width:100%; appearance:none; cursor:pointer; font-weight:600; font-family:var(--body); padding:12px 16px; border-radius:10px; font-size:.98rem; color:#fff; background:var(--accent-dark); border:1px solid var(--accent); transition:background .15s; }
    button.primary:hover{ background:var(--accent); }
    button.primary:disabled{ opacity:.55; cursor:not-allowed; }
    .link-btn{ display:block; margin:12px auto 0; background:none; border:none; cursor:pointer; color:#bcb6e6; font-size:.8rem; font-family:var(--body); }
    .link-btn:hover{ text-decoration:underline; }
    .note{ min-height:1.2em; margin:12px 2px 0; font-size:.84rem; color:var(--muted); text-align:center; }
    .note.ok{ color:var(--ok); } .note.err{ color:var(--danger); }
    .alt{ text-align:center; margin-top:16px; font-size:.82rem; color:var(--muted); }
    .alt a{ color:#bcb6e6; text-decoration:none; } .alt a:hover{ text-decoration:underline; }
  </style>
</head>
<body>
  <div class="card">
    <a class="brand" href="/">TABZOID</a>
    <h1>Welcome back</h1>
    <p class="sub">Log in to your tabs.</p>
    <form id="form" novalidate>
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@example.com" required />
      <label for="pass">Password</label>
      <input id="pass" type="password" autocomplete="current-password" placeholder="Password" required />
      <div class="cf-turnstile" data-sitekey="0x4AAAAAAD1LVVRMkJKcUBeh" data-theme="dark" style="margin:2px auto 14px; display:flex; justify-content:center;"></div>
      <button id="submit" class="primary" type="submit">Log in</button>
      <div style="text-align:center; color:#6f6f80; font-size:.76rem; margin:14px 0 10px;">or</div>
      <button id="googleBtn" type="button" style="width:100%; display:flex; align-items:center; justify-content:center; gap:9px; cursor:pointer; font-weight:600; font-family:var(--body); padding:11px 16px; border-radius:10px; font-size:.92rem; color:var(--ink); background:#1c1930; border:1px solid var(--border);">
        <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path fill="#EA4335" d="M12 10.2v3.9h5.5a4.7 4.7 0 0 1-2 3.1v2.6h3.2c1.9-1.7 3-4.3 3-7.3 0-.7-.1-1.4-.2-2z"/><path fill="#34A853" d="M12 22c2.7 0 5-.9 6.7-2.4l-3.2-2.6c-.9.6-2.1 1-3.5 1-2.7 0-5-1.8-5.8-4.3H2.9v2.7A10 10 0 0 0 12 22z"/><path fill="#FBBC05" d="M6.2 13.7a6 6 0 0 1 0-3.8V7.2H2.9a10 10 0 0 0 0 9z"/><path fill="#4285F4" d="M12 6.6c1.5 0 2.8.5 3.8 1.5l2.8-2.8A10 10 0 0 0 2.9 7.2L6.2 9.9C7 7.4 9.3 6.6 12 6.6z"/></svg>
        Continue with Google
      </button>
    </form>
    <button id="forgot" class="link-btn" type="button">Forgot password?</button>
    <p class="note" id="note" role="status" aria-live="polite"></p>
    <p class="alt">Need an account? <a href="/signup">Create one</a></p>
  </div>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = window.supabase.createClient("https://bgutoifpdohhlbhesjql.supabase.co", "sb_publishable_QfdIsgHMDn1kr4fszUeJ9g_HSKWLru-");
    const $ = (id) => document.getElementById(id);
    function setNote(t, k){ const n = $("note"); n.className = "note" + (k ? " " + k : ""); n.textContent = t; }

    $("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = $("email").value.trim();
      const password = $("pass").value;
      if (!email || !$("email").checkValidity() || !password){ setNote("Enter your email and password.", "err"); return; }
      const captchaToken = window.turnstile ? turnstile.getResponse() : "";
      $("submit").disabled = true; setNote("Logging in…");
      const { error } = await sb.auth.signInWithPassword({ email, password, options: captchaToken ? { captchaToken } : {} });
      if (window.turnstile) try { turnstile.reset(); } catch (_) {}
      if (error){ setNote(error.message || "Could not log in.", "err"); $("submit").disabled = false; return; }
      setNote("Logged in — taking you to your tabs…", "ok");
      $("pass").value = "";
      window.location.href = "/tabs";
    });

    $("forgot").addEventListener("click", async () => {
      const email = $("email").value.trim();
      if (!email || !$("email").checkValidity()){ setNote("Enter your email above, then tap reset.", "err"); $("email").focus(); return; }
      const captchaToken = window.turnstile ? turnstile.getResponse() : "";
      $("forgot").disabled = true; setNote("Sending reset link…");
      const rpOpts = { redirectTo: window.location.origin + "/reset" };
      if (captchaToken) rpOpts.captchaToken = captchaToken;
      const { error } = await sb.auth.resetPasswordForEmail(email, rpOpts);
      if (window.turnstile) try { turnstile.reset(); } catch (_) {}
      $("forgot").disabled = false;
      if (error){ setNote(error.message, "err"); return; }
      setNote("If that email has an account, a reset link is on its way.", "ok");
    });

    $("googleBtn").addEventListener("click", async () => {
      setNote("Redirecting to Google…");
      const { error } = await sb.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: window.location.origin + "/tabs" },
      });
      if (error) setNote(error.message || "Could not start Google sign-in.", "err");
    });
  </script>
</body>
</html>
