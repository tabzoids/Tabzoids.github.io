    @font-face{

    }
    @font-face{

      font-weight:400; font-style:normal; font-display:optional;
    }

    :root{
      --bg:#0e0e12; --bg-elev:#16161c; --ink:#ececf2; --muted:#9a9aaa;
      --accent:#8a66ff; --accent-dark:#6b3fe4; --border:#25252e;
      --body:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    *{box-sizing:border-box;}
    html,body{margin:0; padding:0;}
    body{
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(138,102,255,.18), transparent 60%),
        var(--bg);
      color:var(--ink);
      font-family:var(--body);
      min-height:100vh;
      display:flex; flex-direction:column;
      -webkit-font-smoothing:antialiased;
    }

    main{
      flex:1 0 auto;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center;
      gap:22px;
      padding:56px 22px;
      max-width:820px; width:100%; margin:0 auto;
    }

    .logo{ width:min(460px,84%); height:auto; }

    .badge{
      display:inline-flex; align-items:center; gap:8px;
      font-family:"TOOM",var(--body); letter-spacing:.14em; text-transform:uppercase;
      font-size:.74rem; color:#cdccd8;
      background:var(--bg-elev); border:1px solid var(--border);
      padding:7px 14px; border-radius:999px;
    }
    .badge .dot{ width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 4px rgba(138,102,255,.18); }

    .slogan{
      font-family:"Opsilon",var(--body); font-weight:400;
      font-size:clamp(1.5rem,4.4vw,2.5rem); line-height:1.12; margin:0; color:#eae9f4;
    }
    .intro{
      color:var(--muted); font-size:clamp(1rem,2vw,1.16rem); line-height:1.6;
      max-width:46ch; margin:0;
    }

    .socials{
      display:flex; flex-wrap:wrap; gap:12px; justify-content:center;
      margin-top:6px; max-width:520px;
    }
    .social{
      display:inline-flex; align-items:center; justify-content:center;
      width:44px; height:44px; border-radius:12px;
      color:var(--muted); background:var(--bg-elev); border:1px solid var(--border);
      transition:color .15s ease, border-color .15s ease, transform .15s ease, background .15s ease;
    }
    .social svg{ width:20px; height:20px; }
    .social:hover{ color:#fff; border-color:var(--accent); background:#1c1930; transform:translateY(-2px); }
    @media (hover:none){ .social:hover{ transform:none; } }

    footer{
      flex-shrink:0; text-align:center;
      padding:26px 20px; color:var(--muted); font-size:.85rem;
      border-top:1px solid var(--border);
    }
    footer a{ color:#bcb6e6; text-decoration:none; }
    footer a:hover{ text-decoration:underline; }
  </style>
