<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Your Tabs — Tabzoid</title>

  <link rel="icon" href="../favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="../favicon.png" />

  <link rel="preload" href="../fonts/Opsilon-Regular.woff2" as="font" type="font/woff2" crossorigin>

  <style>
    @font-face{
      font-family:"Opsilon";
      src:url("../fonts/Opsilon-Regular.woff2") format("woff2");
      font-weight:400; font-style:normal; font-display:swap;
    }
    :root{
      --bg:#0e0e12; --bg-elev:#16161c; --ink:#ececf2; --muted:#9a9aaa;
      --accent:#8a66ff; --accent-dark:#6b3fe4; --border:#25252e; --danger:#ff6b6b; --ok:#57d38c;
      --body:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    *{box-sizing:border-box;}
    html,body{margin:0; padding:0;}
    body{
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(138,102,255,.14), transparent 60%),
        var(--bg);
      color:var(--ink); font-family:var(--body); min-height:100vh;
      -webkit-font-smoothing:antialiased;
    }
    /* hide everything until auth is resolved to avoid a flash */
    body.loading .app{ display:none; }

    header.topnav{
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      padding:16px 22px; border-bottom:1px solid var(--border);
      position:sticky; top:0; background:rgba(14,14,18,.85); backdrop-filter:blur(6px); z-index:10;
    }
    .brand{ font-family:"Opsilon",var(--body); font-size:1.25rem; color:#eae9f4; text-decoration:none; }
    .nav{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .nav a, .nav button{
      font-family:var(--body); font-size:.85rem; font-weight:600; color:var(--muted);
      background:transparent; border:1px solid transparent; border-radius:9px; padding:8px 12px;
      cursor:pointer; text-decoration:none; transition:color .15s, background .15s, border-color .15s;
    }
    .nav a:hover, .nav button:hover{ color:#fff; background:var(--bg-elev); border-color:var(--border); }
    .nav a.active{ color:#fff; background:#1c1930; border-color:var(--accent); }
    .nav-ava{ width:30px; height:30px; padding:0; flex:0 0 auto; border-radius:50%; overflow:hidden; border:1px solid var(--border); background:#0f0f15; display:inline-flex; align-items:center; justify-content:center; font-size:.9rem; text-decoration:none; }
    .nav-ava img{ width:100%; height:100%; object-fit:cover; display:block; }
    .nav-ava:hover{ border-color:var(--accent); }

    main{ max-width:820px; margin:0 auto; padding:32px 22px 64px; }
    h1{ font-family:"Opsilon",var(--body); font-weight:400; font-size:1.9rem; margin:0 0 4px; }
    .sub{ color:var(--muted); margin:0 0 26px; font-size:.95rem; }
    .sub b{ color:#cdbcff; }

    .card{
      background:var(--bg-elev); border:1px solid var(--border); border-radius:14px;
      padding:20px; margin-bottom:24px;
    }
    .card h2{ font-size:.78rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:0 0 14px; }
    label{ display:block; font-size:.8rem; color:var(--muted); margin:0 0 5px; }
    input, textarea{
      width:100%; padding:11px 12px; margin-bottom:12px; border-radius:9px;
      border:1px solid var(--border); background:#0f0f15; color:var(--ink); font-size:.95rem; font-family:var(--body);
    }
    input:focus, textarea:focus{ outline:none; border-color:var(--accent); }
    button.primary{
      appearance:none; cursor:pointer; font-weight:600; font-family:var(--body);
      padding:11px 18px; border-radius:10px; font-size:.95rem;
      color:#fff; background:var(--accent-dark); border:1px solid var(--accent); transition:background .15s;
    }
    button.primary:hover{ background:var(--accent); }
    button.primary:disabled{ opacity:.55; cursor:not-allowed; }
    .msg{ font-size:.85rem; margin-top:8px; min-height:1.1em; }
    .msg.err{ color:var(--danger); } .msg.ok{ color:var(--ok); }

    .finds{ list-style:none; margin:0; padding:0; display:grid; gap:12px; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); }
    .find{
      background:var(--bg-elev); border:1px solid var(--border); border-radius:12px; padding:14px 16px;
      display:flex; flex-direction:column; gap:6px; position:relative;
    }
    .find .brand{ font-weight:700; color:#dcd6ff; font-size:1.05rem; }
    .find .note{ color:var(--ink); font-size:.9rem; }
    .find .date{ color:var(--muted); font-size:.75rem; margin-top:4px; }
    .find .del{
      position:absolute; top:10px; right:10px; background:transparent; border:none; color:var(--muted);
      cursor:pointer; font-size:1rem; line-height:1; padding:2px 5px; border-radius:6px;
    }
    .find .del:hover{ color:var(--danger); background:#0f0f15; }
    .empty{ color:var(--muted); font-size:.92rem; padding:8px 2px; }
    .pill{ display:inline-block; font-size:.7rem; padding:3px 9px; border-radius:999px; background:#0f0f15; border:1px solid var(--border); color:var(--muted); }
    .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .filedrop{ margin-bottom:12px; }
    .filedrop input[type=file]{ font-size:.82rem; padding:8px; }
    .find .thumbs{ display:flex; gap:6px; margin-bottom:4px; }
    .find .thumbs img{ width:52px; height:68px; object-fit:cover; border-radius:6px; border:1px solid var(--border); background:#0f0f15; }
    .find .meta{ color:var(--muted); font-size:.78rem; }
    .find .actions{ display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
    .find .actions button{ appearance:none; cursor:pointer; font-weight:600; font-family:var(--body); font-size:.74rem; padding:6px 10px; border-radius:8px; color:var(--ink); background:#1c1930; border:1px solid var(--border); transition:border-color .15s,color .15s; }
    .find .actions button:hover{ border-color:var(--accent); }
    .status{ display:inline-block; width:fit-content; margin-top:4px; font-size:.62rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:3px 8px; border-radius:999px; border:1px solid var(--border); background:#0f0f15; color:var(--muted); }
    .status.submitted{ color:var(--accent); border-color:rgba(138,102,255,.5); }
    .status.approved{ color:var(--ok); border-color:rgba(87,211,140,.4); }
    .status.rejected{ color:var(--danger); border-color:rgba(255,107,107,.4); }
  </style>
</head>
<body class="loading">
  <div class="app">
    <header class="topnav">
      <a class="brand" href="/">Tabzoid</a>
      <nav class="nav">
        <a href="/tabs" class="active">Tabs</a>
        <a href="/profile">Profile</a>
        <a href="/admin" id="adminLink" style="display:none">Admin</a>
        <button id="logoutBtn" type="button">Log out</button>
        <a href="/profile" class="nav-ava" id="navAva" title="Your profile"></a>
      </nav>
    </header>

    <main>
      <h1>Your Tab Finds</h1>
      <p class="sub">Signed in as <b id="whoami"></b> <span class="pill">RLS-protected</span></p>

      <div class="card">
        <h2>Add a tab</h2>
        <label for="brand">Brand *</label>
        <input id="brand" type="text" placeholder="e.g. Bubly Sparkling Water" maxlength="120" />
        <div class="row2">
          <div><label for="flavor">Flavor</label><input id="flavor" type="text" maxlength="80" placeholder="e.g. Cherry" /></div>
          <div><label for="color">Color</label><input id="color" type="text" maxlength="40" placeholder="e.g. red" /></div>
        </div>
        <label for="mark">Word / mark</label>
        <input id="mark" type="text" maxlength="60" placeholder="e.g. hi u" />
        <label for="note">Note</label>
        <input id="note" type="text" placeholder="e.g. found in a 1987 time capsule" maxlength="240" />
        <div class="row2">
          <div class="filedrop"><label for="frontFile">Front photo</label><input id="frontFile" type="file" accept="image/*" /></div>
          <div class="filedrop"><label for="backFile">Back photo</label><input id="backFile" type="file" accept="image/*" /></div>
        </div>
        <button id="addBtn" class="primary" type="button">Add to collection</button>
        <div id="addMsg" class="msg"></div>
      </div>

      <ul id="findsList" class="finds"></ul>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://bgutoifpdohhlbhesjql.supabase.co";
    const SUPABASE_KEY = "sb_publishable_QfdIsgHMDn1kr4fszUeJ9g_HSKWLru-";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const $ = (id) => document.getElementById(id);
    function setMsg(el, t, k){ el.className = "msg" + (k ? " " + k : ""); el.textContent = t || ""; }

    // ---- auth guard: must be logged in ----
    async function guard(){
      const { data:{ session } } = await sb.auth.getSession();
      if (!session){ window.location.replace("/"); return null; }
      $("whoami").textContent = session.user.email;
      document.body.classList.remove("loading");
      sb.from("profiles").select("is_admin, avatar_url, terms_accepted_at").eq("id", session.user.id).maybeSingle()
        .then(({ data }) => {
          if (!data) return;
          if (!data.terms_accepted_at){ window.location.replace("/profile?welcome=1"); return; }
          if (data.is_admin) { const l = document.getElementById("adminLink"); if (l) l.style.display = ""; }
          setNavAva(data.avatar_url);
        });
      return session;
    }

    function setNavAva(url){
      const el = document.getElementById("navAva");
      if (!el) return;
      if (url){ el.innerHTML = ""; const i = document.createElement("img"); i.src = url; i.alt = ""; el.appendChild(i); }
      else { el.innerHTML = "<span>🥫</span>"; }
    }

    // ---- client-side image -> capped WebP ----
    async function toWebp(file, maxEdge){
      if (!file) return null;
      const img = await new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = URL.createObjectURL(file); });
      let w = img.width, h = img.height;
      const scale = Math.min(1, maxEdge / Math.max(w, h));
      w = Math.round(w * scale); h = Math.round(h * scale);
      const c = document.createElement("canvas"); c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(img.src);
      return await new Promise((res) => c.toBlob(res, "image/webp", 0.85));
    }

    async function uploadImage(userId, findId, side, file){
      if (!file) return null;
      if (!/^image\//.test(file.type)){ throw new Error("Photos must be image files."); }
      if (file.size > 10 * 1024 * 1024){ throw new Error("Each photo must be under 10 MB."); }
      const blob = await toWebp(file, 1400);
      const path = userId + "/" + findId + "/" + side + ".webp";
      const { error } = await sb.storage.from("tab-uploads").upload(path, blob, { upsert:true, contentType:"image/webp" });
      if (error) throw error;
      return path;
    }

    async function signed(path){
      if (!path) return null;
      const { data } = await sb.storage.from("tab-uploads").createSignedUrl(path, 3600);
      return data ? data.signedUrl : null;
    }

    const STATUS_LABEL = { private:"Private", submitted:"Pending review", approved:"In catalog", rejected:"Needs changes" };

    // ---- collection + submission ----
    async function loadFinds(){
      const { data, error } = await sb.from("tab_finds")
        .select("id, brand, flavor, color, mark, note, image_front, image_back, review_status, review_note, found_at")
        .order("found_at", { ascending:false });
      const list = $("findsList");
      if (error){ list.innerHTML = '<li class="empty">Could not load: ' + error.message + '</li>'; return; }
      list.innerHTML = "";
      if (!data.length){ list.innerHTML = '<li class="empty">No tabs yet — add your first one above.</li>'; return; }
      for (const f of data){
        const li = document.createElement("li"); li.className = "find";
        const status = f.review_status || "private";
        const meta = [f.flavor, f.color, f.mark].filter(Boolean).join(" · ");
        li.innerHTML =
          '<button class="del" title="Delete">&times;</button>' +
          '<div class="thumbs"></div>' +
          '<span class="brand"></span>' +
          '<span class="meta"></span>' +
          '<span class="note"></span>' +
          '<span class="status ' + status + '"></span>' +
          '<div class="actions"></div>';
        li.querySelector(".brand").textContent = f.brand;
        li.querySelector(".meta").textContent = meta;
        li.querySelector(".note").textContent = f.note || "";
        li.querySelector(".status").textContent = STATUS_LABEL[status] || status;
        const th = li.querySelector(".thumbs");
        for (const p of [f.image_front, f.image_back]){
          if (!p) continue;
          const img = document.createElement("img"); img.alt = "";
          signed(p).then(u => { if (u) img.src = u; });
          th.appendChild(img);
        }
        const act = li.querySelector(".actions");
        if (status === "private" || status === "rejected"){
          const b = document.createElement("button"); b.textContent = "Submit for review";
          b.addEventListener("click", () => setStatus(f.id, "submitted")); act.appendChild(b);
        } else if (status === "submitted"){
          const b = document.createElement("button"); b.textContent = "Withdraw";
          b.addEventListener("click", () => setStatus(f.id, "private")); act.appendChild(b);
        }
        if (status === "rejected" && f.review_note){
          const n = document.createElement("span"); n.className = "meta"; n.textContent = "Reviewer: " + f.review_note; li.appendChild(n);
        }
        li.querySelector(".del").addEventListener("click", () => removeFind(f));
        list.appendChild(li);
      }
    }

    async function addFind(){
      const brand = $("brand").value.trim();
      if (!brand){ setMsg($("addMsg"), "Enter a brand first.", "err"); return; }
      $("addBtn").disabled = true; setMsg($("addMsg"), "Saving…");
      try {
        const { data: { user } } = await sb.auth.getUser();
        const { data: row, error } = await sb.from("tab_finds").insert({
          brand,
          flavor: $("flavor").value.trim() || null,
          color: $("color").value.trim() || null,
          mark: $("mark").value.trim() || null,
          note: $("note").value.trim() || null,
        }).select("id").single();
        if (error) throw error;
        const frontPath = await uploadImage(user.id, row.id, "front", $("frontFile").files[0]);
        const backPath  = await uploadImage(user.id, row.id, "back",  $("backFile").files[0]);
        if (frontPath || backPath){
          const { error: e2 } = await sb.from("tab_finds").update({ image_front: frontPath, image_back: backPath }).eq("id", row.id);
          if (e2) throw e2;
        }
        ["brand","flavor","color","mark","note"].forEach(id => { $(id).value = ""; });
        $("frontFile").value = ""; $("backFile").value = "";
        setMsg($("addMsg"), "Added to your collection.", "ok");
        loadFinds();
      } catch (e){
        setMsg($("addMsg"), e.message || String(e), "err");
      } finally {
        $("addBtn").disabled = false;
      }
    }

    async function setStatus(id, status){
      const { error } = await sb.from("tab_finds").update({ review_status: status }).eq("id", id);
      if (error){ setMsg($("addMsg"), error.message, "err"); return; }
      loadFinds();
    }

    async function removeFind(f){
      if (!confirm("Delete this tab from your collection?")) return;
      const paths = [f.image_front, f.image_back].filter(Boolean);
      if (paths.length){ try { await sb.storage.from("tab-uploads").remove(paths); } catch (_) {} }
      const { error } = await sb.from("tab_finds").delete().eq("id", f.id);
      if (error){ setMsg($("addMsg"), error.message, "err"); return; }
      loadFinds();
    }

    $("addBtn").addEventListener("click", addFind);
    $("logoutBtn").addEventListener("click", async () => { await sb.auth.signOut(); window.location.replace("/"); });
    sb.auth.onAuthStateChange((event) => { if (event === "SIGNED_OUT") window.location.replace("/"); });

    (async () => { const s = await guard(); if (s) loadFinds(); })();
  </script>
</body>
</html>
