<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Tab Fall — Demo</title>
  <style>
    @font-face{ font-family:"TOOM"; src:url("../fonts/TOOM-Regular.woff2") format("woff2"); font-weight:400; font-display:swap; }
    :root{
      --bg:#0e0e12; --bg-elev:#16161c; --ink:#ececf2; --muted:#9a9aaa;
      --accent:#8a66ff; --accent-dark:#6b3fe4; --border:#25252e; --ok:#57d38c;
      --body:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    *{box-sizing:border-box;}
    html,body{margin:0; overflow-x:hidden;}
    body{
      min-height:100vh; background:radial-gradient(1000px 600px at 50% -10%, rgba(138,102,255,.14), transparent 60%), var(--bg);
      color:var(--ink); font-family:var(--body); -webkit-font-smoothing:antialiased;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:40px 20px;
    }
    .tag{ color:var(--muted); font-size:.8rem; letter-spacing:.14em; text-transform:uppercase; }

    .signup{
      position:relative; z-index:2; width:100%; max-width:520px;
      background:var(--bg-elev); border:1px solid var(--border); border-radius:16px;
      padding:16px 26px 14px; box-shadow:0 0 0 1px rgba(138,102,255,.06), 0 14px 34px rgba(0,0,0,.35);
    }
    .signup-cta{ margin:0 0 10px; font-family:"TOOM",var(--body); font-size:1.4rem; letter-spacing:.04em; color:#c7c6d4; }
    form{ display:flex; gap:9px; align-items:stretch; }
    input{
      flex:1 1 auto; min-width:0; padding:12px 14px; border-radius:11px;
      border:1px solid var(--border); background:#0f0f15; color:var(--ink); font-size:1rem; font-family:var(--body);
    }
    input:focus{ outline:none; border-color:var(--accent); }
    button{
      flex:0 0 auto; cursor:pointer; font-weight:600; font-family:var(--body);
      padding:12px 24px; border-radius:11px; font-size:1rem; color:#fff;
      background:var(--accent-dark); border:1px solid var(--accent);
      box-shadow:0 0 20px rgba(138,102,255,.4); transition:background .15s, box-shadow .15s;
    }
    button:hover{ background:var(--accent); box-shadow:0 0 28px rgba(138,102,255,.6); }
    .note{ min-height:1.2em; margin:12px 2px 0; font-size:.86rem; color:var(--muted); text-align:center; }
    .note.ok{ color:var(--ok); }

    .controls{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
    .controls label{ color:var(--muted); font-size:.78rem; display:flex; align-items:center; gap:6px; }
    .controls input[type=range]{ accent-color:var(--accent); }
    .hint{ color:var(--muted); font-size:.75rem; }

    /* particle layer */
    #tabfall{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
    #tabfall img{ position:absolute; top:0; left:0; will-change:transform; filter:drop-shadow(0 4px 6px rgba(0,0,0,.5)); }
  </style>
</head>
<body>
  <div class="tag">TAB FALL — DEMO (no database)</div>

  <div class="signup">
    <p class="signup-cta">Subscribe to keep tabs on us</p>
    <form id="form">
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
      <button type="submit">Subscribe</button>
    </form>
    <p class="note" id="note">No Ads, Just Tabs!</p>
  </div>

  <div class="controls">
    <label>Tabs <input id="count" type="range" min="20" max="160" step="10" value="70"></label>
    <label>Size <input id="size" type="range" min="14" max="52" step="2" value="30"></label>
    <label>Gravity <input id="grav" type="range" min="0.1" max="0.9" step="0.05" value="0.4"></label>
  </div>
  <div class="hint">Enter anything and hit Subscribe to watch the tabs fall. Adjust sliders, then subscribe again to replay.</div>

  <div id="tabfall" aria-hidden="true"></div>

  <script>
    const layer = document.getElementById("tabfall");
    const form = document.getElementById("form");
    const note = document.getElementById("note");
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    let particles = [];
    let running = false;
    let last = 0;

    function rand(a,b){ return a + Math.random()*(b-a); }

    function ensureRunning(){
      if (!running){ running = true; last = performance.now(); requestAnimationFrame(loop); }
    }

    function spawnBurst(){
      const total = +document.getElementById("count").value;
      const baseSize = +document.getElementById("size").value;
      const W = window.innerWidth;
      let made = 0;
      const per = Math.ceil(total / 14); // spread spawns over ~14 ticks
      const timer = setInterval(() => {
        for (let k=0; k<per && made<total; k++, made++){
          const img = new Image();
          img.src = "../pop-tab.png";
          const size = rand(baseSize*0.7, baseSize*1.3);
          img.style.width = size + "px";
          const x = rand(-20, W+20), y = rand(-120, -20), rot = rand(0, 360);
          // position it immediately so it never flashes in the corner
          img.style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg)`;
          layer.appendChild(img);
          particles.push({
            el: img, x, y, rot,
            vx: rand(-0.6, 0.6),
            vy: rand(0.5, 2.5),
            vrot: rand(-8, 8),
            sway: rand(0.3, 0.9),
            phase: rand(0, 6.28),
            done:false
          });
        }
        ensureRunning();           // keep the loop alive as tabs keep spawning
        if (made >= total) clearInterval(timer);
      }, 45);
    }

    function loop(now){
      const dt = Math.min(2.5, (now - last)/16); last = now;
      const g = +document.getElementById("grav").value;
      const H = window.innerHeight;
      for (const p of particles){
        if (p.done) continue;
        p.vy += g * dt;
        p.x += (p.vx + Math.sin((now/380) + p.phase) * p.sway) * dt;
        p.y += p.vy * dt;
        p.rot += p.vrot * dt;
        p.el.style.transform = `translate(${p.x}px, ${p.y}px) rotate(${p.rot}deg)`;
        if (p.y > H + 120){ p.done = true; p.el.remove(); }
      }
      particles = particles.filter(p => !p.done);
      if (particles.length) requestAnimationFrame(loop);
      else running = false;
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      note.className = "note ok";
      note.textContent = "You're Added to the Tab List!";
      if (reduce) return; // respect reduced motion
      spawnBurst();
    });
  </script>
</body>
</html>
