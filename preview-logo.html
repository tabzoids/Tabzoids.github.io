<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Logo preview — Tabzoid</title>
<style>
  :root{ --bg:#0e0e12; --bg-elev:#16161c; --ink:#ececf2; --muted:#9a9aaa; --border:#26262f; }
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:48px 22px; gap:14px; box-sizing:border-box;
  }
  h1{ font-size:1.1rem; font-weight:600; letter-spacing:.02em; margin:0 0 24px; }
  .row{
    width:100%; max-width:820px; display:flex; flex-direction:column; align-items:center;
    gap:10px; padding:40px 22px; border:1px solid var(--border); border-radius:16px;
    background:var(--bg-elev); margin-bottom:22px;
  }
  .tag{ font-size:.74rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
  .logo{ width:min(460px,84%); height:auto; }
  .note{ color:var(--muted); font-size:.85rem; text-align:center; max-width:560px; }
</style>
</head>
<body>
  <h1>Logo preview — same size &amp; background as the live homepage</h1>

  <div class="row">
    <span class="tag">Current — tabzoid-dark.webp</span>
    <img class="logo" src="tabzoid-dark.webp" alt="Current Tabzoid logo">
  </div>

  <div class="row">
    <span class="tag">New — images/tabzoid-logo.png</span>
    <img class="logo" src="images/tabzoid-logo.png" alt="New Tabzoid logo">
  </div>

  <p class="note">Both shown at the homepage logo width (min(460px, 84%)) on the site's dark background. Nothing on the live site has been changed.</p>
</body>
</html>
