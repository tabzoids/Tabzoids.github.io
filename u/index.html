<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabist — Tabzoid</title>
  <meta name="description" content="A tabist's public profile on Tabzoid." />

  <link rel="icon" href="../favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="../favicon.png" />
  <link rel="preload" href="../fonts/Opsilon-Regular.woff2" as="font" type="font/woff2" crossorigin>

  <style>
    @font-face{ font-family:"Opsilon"; src:url("../fonts/Opsilon-Regular.woff2") format("woff2"); font-weight:400; font-display:swap; }
    :root{
      --bg:#0e0e12; --bg-elev:#16161c; --ink:#ececf2; --muted:#9a9aaa;
      --accent:#8a66ff; --accent-dark:#6b3fe4; --border:#25252e; --ok:#57d38c;
      --body:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    *{box-sizing:border-box;}
    html,body{margin:0; padding:0;}
    body{
      background:radial-gradient(1200px 600px at 50% -10%, rgba(138,102,255,.14), transparent 60%), var(--bg);
      color:var(--ink); font-family:var(--body); min-height:100vh; -webkit-font-smoothing:antialiased;
    }
    header.topnav{
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      padding:16px 22px; border-bottom:1px solid var(--border);
    }
    .brand{ font-family:"Opsilon",var(--body); font-size:1.25rem; color:#eae9f4; text-decoration:none; }
    .nav a{ font-size:.85rem; font-weight:600; color:var(--muted); text-decoration:none; padding:8px 12px; border:1px solid transparent; border-radius:9px; }
    .nav a:hover{ color:#fff; background:var(--bg-elev); border-color:var(--border); }

    main{ max-width:560px; margin:0 auto; padding:40px 22px 64px; }
    .state{ color:var(--muted); text-align:center; padding:60px 0; font-size:.95rem; }

    .pcard{ background:var(--bg-elev); border:1px solid var(--border); border-radius:18px; padding:28px 26px; text-align:center; }
    .avatar{
      width:104px; height:104px; border-radius:50%; margin:0 auto 14px; overflow:hidden;
      background:#0f0f15; border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center; font-size:2.4rem;
    }
    .avatar img{ width:100%; height:100%; object-fit:cover; display:block; }
    .dname{ font-family:"Opsilon",var(--body); font-weight:400; font-size:1.7rem; margin:0; color:#eae9f4; }
    .uname{ color:var(--accent); font-size:.92rem; margin:3px 0 0; }
    .bio{ color:var(--ink); font-size:.95rem; line-height:1.6; margin:16px auto 0; max-width:42ch; }

    .links{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:18px; }
    .links a{
      display:inline-flex; align-items:center; gap:6px; font-size:.82rem; font-weight:600;
      color:#dcd6ff; text-decoration:none; background:#1c1930; border:1px solid var(--border);
      padding:8px 13px; border-radius:999px; transition:border-color .15s, color .15s;
    }
    .links a:hover{ border-color:var(--accent); color:#fff; }

    .stats{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:22px; }
    .stat{ background:var(--bg-elev); border:1px solid var(--border); border-radius:14px; padding:16px 10px; text-align:center; }
    .stat .num{ font-family:"Opsilon",var(--body); font-size:1.5rem; color:#cdbcff; line-height:1; }
    .stat .lab{ font-size:.68rem; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-top:7px; }
    .soon{ text-align:center; color:#6f6f80; font-size:.72rem; margin-top:12px; }

    footer{ text-align:center; padding:24px; color:var(--muted); font-size:.82rem; border-top:1px solid var(--border); }
    footer a{ color:#bcb6e6; text-decoration:none; }
  </style>
</head>
<body>
  <header class="topnav">
    <a class="brand" href="/">Tabzoid</a>
    <nav class="nav"><a href="/">Home</a></nav>
  </header>

  <main>
    <div id="loading" class="state">Loading tabist…</div>
    <div id="notfound" class="state" style="display:none">That tabist couldn't be found.</div>

    <div id="profile" style="display:none">
      <div class="pcard">
        <div class="avatar" id="avatar"><span>🥫</span></div>
        <h1 class="dname" id="dname"></h1>
        <p class="uname" id="uname"></p>
        <p class="bio" id="bio"></p>
        <div class="links" id="links"></div>
      </div>

      <div class="stats">
        <div class="stat"><div class="num" id="statContributed">0</div><div class="lab">Contributed</div></div>
        <div class="stat"><div class="num" id="statSince">—</div><div class="lab">Member Since</div></div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; <span id="yr"></span> Tabzoid&trade; &bull; <a href="/">tabzoid.com</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    document.getElementById("yr").textContent = new Date().getFullYear();
    const SUPABASE_URL = "https://bgutoifpdohhlbhesjql.supabase.co";
    const SUPABASE_KEY = "sb_publishable_QfdIsgHMDn1kr4fszUeJ9g_HSKWLru-";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const $ = (id) => document.getElementById(id);

    // username from ?u=name  OR  ?name
    const params = new URLSearchParams(location.search);
    let username = params.get("u") || location.search.replace(/^\?/, "");
    username = decodeURIComponent(username || "").trim();

    function linkLabel(url){
      try {
        const h = new URL(url).hostname.replace(/^www\./, "");
        const map = { "instagram.com":"Instagram", "x.com":"X", "twitter.com":"X",
          "tiktok.com":"TikTok", "youtube.com":"YouTube", "facebook.com":"Facebook",
          "bsky.app":"Bluesky", "pinterest.com":"Pinterest", "reddit.com":"Reddit",
          "github.com":"GitHub", "threads.net":"Threads" };
        return map[h] || h;
      } catch { return url; }
    }

    function show(which){
      $("loading").style.display = which === "loading" ? "" : "none";
      $("notfound").style.display = which === "notfound" ? "" : "none";
      $("profile").style.display = which === "profile" ? "" : "none";
    }

    async function load(){
      if (!username){ show("notfound"); return; }
      const { data, error } = await sb.from("profiles")
        .select("id, username, display_name, bio, avatar_url, link1, link2, link3, created_at")
        .ilike("username", username).maybeSingle();
      if (error || !data){ show("notfound"); return; }

      document.title = (data.display_name || data.username || "Tabist") + " — Tabzoid";
      if (data.avatar_url){
        $("avatar").innerHTML = "";
        const img = document.createElement("img"); img.src = data.avatar_url; img.alt = ""; $("avatar").appendChild(img);
      }
      $("dname").textContent = data.display_name || data.username || "Tabist";
      $("uname").textContent = data.username ? "@" + data.username : "";
      if (data.bio) $("bio").textContent = data.bio; else $("bio").style.display = "none";

      const linksEl = $("links");
      for (const url of [data.link1, data.link2, data.link3]){
        if (!url) continue;
        const a = document.createElement("a");
        a.href = url; a.target = "_blank"; a.rel = "noopener noreferrer nofollow ugc";
        a.textContent = linkLabel(url);
        linksEl.appendChild(a);
      }

      // Member Since — real, from account creation date
      if (data.created_at){
        $("statSince").textContent = new Date(data.created_at)
          .toLocaleDateString(undefined, { month: "short", year: "numeric" });
      }

      // Contributed — verified count of this user's approved catalog submissions
      try {
        const { data: cc } = await sb.rpc("public_contribution_count", { p_user_id: data.id });
        $("statContributed").textContent = (cc ?? 0);
      } catch (_) { /* leave default 0 */ }

      show("profile");
    }

    load();
  </script>
</body>
</html>
